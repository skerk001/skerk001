<svg width="100%" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Animated gradient background -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#111827;#0d1117" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#161b22">
        <animate attributeName="stop-color" values="#161b22;#1a1f2e;#161b22" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#111827;#0d1117" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Subtle accent line gradient -->
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="30%" stop-color="#58a6ff" stop-opacity="0.8">
        <animate attributeName="stop-opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#79c0ff" stop-opacity="1">
        <animate attributeName="stop-opacity" values="1;0.6;1" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="70%" stop-color="#58a6ff" stop-opacity="0.8">
        <animate attributeName="stop-opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Moving shimmer for the accent line -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#79c0ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#79c0ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#79c0ff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Particle dots pattern -->
    <radialGradient id="dot-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bg-grad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="40" x2="1200" y2="40" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="200" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="200" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="200" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="200" stroke="#58a6ff" stroke-width="0.5"/>
  </g>

  <!-- Floating particles with staggered fade animation -->
  <circle cx="150" cy="45" r="1.5" fill="#58a6ff" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="130" r="1" fill="#79c0ff" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="7s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="720" cy="55" r="1.2" fill="#58a6ff" opacity="0.25">
    <animate attributeName="opacity" values="0.1;0.45;0.1" dur="6s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="950" cy="140" r="1.5" fill="#79c0ff" opacity="0.2">
    <animate attributeName="opacity" values="0.05;0.35;0.05" dur="8s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="1050" cy="70" r="1" fill="#58a6ff" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite" begin="3s"/>
  </circle>
  <circle cx="530" cy="35" r="0.8" fill="#79c0ff" opacity="0.2">
    <animate attributeName="opacity" values="0.05;0.3;0.05" dur="9s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle cx="280" cy="160" r="1.2" fill="#58a6ff" opacity="0.15">
    <animate attributeName="opacity" values="0.05;0.35;0.05" dur="6s" repeatCount="indefinite" begin="4s"/>
  </circle>
  <circle cx="850" cy="100" r="1" fill="#79c0ff" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="5s" repeatCount="indefinite" begin="2.5s"/>
  </circle>

  <!-- Name text -->
  <text x="600" y="82" text-anchor="middle" fill="#e6edf3" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="600" letter-spacing="2">
    Samir Kerkar
  </text>

  <!-- Accent line below name -->
  <rect x="440" y="98" width="320" height="2" rx="1" fill="url(#shimmer)"/>

  <!-- Subtitle -->
  <text x="600" y="130" text-anchor="middle" fill="#8b949e" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="400" letter-spacing="1.5">
    DATA SCIENTIST  ·  CAUSAL INFERENCE  ·  MACHINE LEARNING
  </text>

  <!-- Bottom accent line (very subtle) -->
  <rect x="0" y="196" width="1200" height="4" fill="url(#accent-line)"/>
</svg>
